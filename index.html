<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Team Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Basketball Team Assigner</h1>
        <div class="input-section">
            <label for="player-count">Enter Total Number of Players (must be > 6):</label>
            <input type="number" id="player-count" name="player-count" min="7">
            <button id="assign-button">Assign Teams</button>
        </div>

        <div class="visualization-section">
            <canvas id="player-canvas" width="500" height="500"></canvas>
            <!-- Basketball image for animation will be handled by JS, or we can place an img element here if preferred -->
        </div>

        <div class="results-section">
            <h2>Team Assignments:</h2>
            <div id="teams-output">
                <!-- Team assignments will be displayed here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
